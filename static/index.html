<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JoyAI · Image — Local Workbench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="/static/style.css?v=2" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="wordmark">JoyAI <span class="wordmark-rule">—</span> <span class="wordmark-accent">Image</span></span>
        <span class="brand-sub">Local inference workbench</span>
      </div>
      <div class="topbar-meta">
        <div id="gpuGrid" class="gpu-strip" aria-label="GPU telemetry">
          <p class="gpu-loading">Polling telemetry…</p>
        </div>
        <div id="statusPill" class="status status-offline">Connecting…</div>
      </div>
    </header>

    <main class="layout">
      <section id="workbench" class="workbench">
        <section class="canvas-block">
          <div class="image-grid">
            <article class="image-card image-card-input">
              <div class="card-heading">
                <h3>Input</h3>
              </div>
              <div id="uploadSlot" class="upload-slot" role="button" tabindex="0" aria-label="Upload input image">
                <span id="inputPlaceholder" class="placeholder">
                  <span class="placeholder-main">Drop an image</span>
                  <span class="placeholder-sub">or click to upload</span>
                </span>
                <div id="inputStage" class="input-stage" hidden>
                  <img id="inputImage" alt="Input preview" hidden />
                  <canvas id="guideCanvas" class="guide-canvas" hidden></canvas>
                </div>
              </div>
              <input id="imageInput" type="file" accept="image/*" hidden />
              <div class="image-actions">
                <button type="button" id="uploadInputBtn" class="btn btn-outline">Upload</button>
                <span class="icon-group">
                  <button type="button" id="toggleGuideBtn" class="btn btn-icon btn-outline" disabled aria-label="Draw red box" title="Draw red destination box">
                    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true">
                      <rect x="2.75" y="2.75" width="12.5" height="12.5" stroke-dasharray="2.2 1.6"/>
                    </svg>
                  </button>
                  <button type="button" id="clearGuideBtn" class="btn btn-icon btn-outline" disabled aria-label="Clear red box" title="Clear the red box">
                    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true">
                      <rect x="2.75" y="2.75" width="12.5" height="12.5" stroke-dasharray="2.2 1.6"/>
                      <path d="M5.5 5.5 l7 7"/>
                    </svg>
                  </button>
                  <button type="button" id="clearInputBtn" class="btn btn-icon btn-outline" disabled aria-label="Clear input image" title="Remove the input image">
                    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true">
                      <path d="M4 4 l10 10 M14 4 l-10 10"/>
                    </svg>
                  </button>
                </span>
              </div>
            </article>

            <article class="image-card image-card-output">
              <div class="card-heading">
                <h3>Output</h3>
              </div>
              <div class="output-slot">
                <div id="outputPlaceholder" class="placeholder">
                  <span class="placeholder-main">Awaiting render</span>
                  <span class="placeholder-sub">the result will appear here</span>
                </div>
                <img id="outputImage" alt="Generated output" hidden />
              </div>
              <div class="image-actions">
                <a id="downloadBtn" class="btn btn-secondary" download aria-disabled="true" href="#">Download</a>
                <button type="button" id="useAsInputBtn" class="btn btn-outline" disabled>Use as input</button>
              </div>
            </article>
          </div>
        </section>

        <section class="mode-block">
          <div class="mode-bar">
            <label class="mode-field">
              <span class="mode-field-label">Mode</span>
              <select id="spatialModeInput" class="mode-select">
                <option value="none" selected>Free Edit</option>
                <option value="move">Object Move</option>
                <option value="rotate">Object Rotation</option>
                <option value="camera">Camera Control</option>
                <option value="t2i">Text to Image</option>
              </select>
            </label>

            <div class="mode-inputs">
              <label class="mode-field" id="spatialObjectGroup" hidden>
                <span class="mode-field-label">Object</span>
                <input id="spatialObjectInput" type="text" placeholder="e.g. apple" />
              </label>
              <label class="mode-field" id="spatialViewGroup" hidden>
                <span class="mode-field-label">View</span>
                <select id="spatialViewInput">
                  <option value="front">front</option>
                  <option value="right" selected>right</option>
                  <option value="left">left</option>
                  <option value="rear">rear</option>
                  <option value="front right">front right</option>
                  <option value="front left">front left</option>
                  <option value="rear right">rear right</option>
                  <option value="rear left">rear left</option>
                </select>
              </label>
              <div id="spatialCameraGroup" class="mode-camera-group" hidden>
                <label class="mode-field">
                  <span class="mode-field-label">Yaw°</span>
                  <input id="cameraYawInput" type="number" min="-180" max="180" step="1" value="45" />
                </label>
                <label class="mode-field">
                  <span class="mode-field-label">Pitch°</span>
                  <input id="cameraPitchInput" type="number" min="-90" max="90" step="1" value="0" />
                </label>
                <label class="mode-field">
                  <span class="mode-field-label">Zoom</span>
                  <select id="cameraZoomInput">
                    <option value="in">in</option>
                    <option value="out">out</option>
                    <option value="unchanged" selected>unchanged</option>
                  </select>
                </label>
              </div>
            </div>

            <div class="mode-bar-right">
              <div class="popover-host">
                <button type="button" id="sizeBtn" class="chip-btn" aria-haspopup="true" aria-expanded="false">
                  <span class="chip-label">Size</span>
                  <span id="sizeBtnValue" class="chip-value">1024</span>
                  <span class="chip-caret">▾</span>
                </button>
                <div id="sizePopover" class="popover popover-right" hidden role="dialog" aria-label="Size settings"></div>
              </div>

              <div class="popover-host">
                <button type="button" id="presetBtn" class="chip-btn" aria-haspopup="true" aria-expanded="false" title="Presets">
                  <span class="chip-icon" aria-hidden="true">
                    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true">
                      <circle cx="9" cy="9" r="2.5"/>
                      <path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.6 3.6l1.4 1.4M13 13l1.4 1.4M3.6 14.4l1.4-1.4M13 5l1.4-1.4"/>
                    </svg>
                  </span>
                  <span id="presetBtnValue" class="chip-value">Default</span>
                  <span class="chip-caret">▾</span>
                </button>
                <div id="presetPopover" class="popover popover-right" hidden role="dialog" aria-label="Presets"></div>
              </div>
            </div>
          </div>

          <p id="spatialModeHelp" class="help-text mode-help"></p>

          <form id="chatForm" class="chat-form">
            <textarea id="promptInput" rows="3" placeholder="e.g. replace the sofa with a bronze velvet chaise, keep the morning light…" required></textarea>
            <div id="promptDirtyRow" class="prompt-dirty-row" hidden>
              <button type="button" id="resetPromptBtn" class="link-btn">Prompt edited — reset from template</button>
            </div>
            <div class="neg-prompt-row">
              <input id="negPromptInput" type="text" placeholder="Negative prompt (things to avoid — e.g. blurry, extra fingers)" />
            </div>
            <div class="chat-actions">
              <span id="elapsed" class="status-label">Ready</span>
              <button type="submit" id="runBtn" class="btn btn-primary btn-run">Run</button>
            </div>
          </form>

          <div id="chatLog" class="chat-log" aria-live="polite" aria-label="Activity log"></div>
        </section>

        <section class="history-block">
          <div id="historyGrid" class="history-grid">No outputs yet.</div>
        </section>
      </section>
    </main>

    <footer class="app-foot">
      <span class="brand-sub">JoyAI · Image</span>
      <span class="foot-dot">·</span>
      <span class="foot-text">Served locally via FastAPI</span>
    </footer>
  </div>

  <!-- Slide-over panel: edit presets (full CRUD) -->
  <div id="presetPanel" class="preset-panel" hidden role="dialog" aria-modal="false" aria-label="Edit presets">
    <div class="preset-panel-inner">
      <header class="preset-panel-head">
        <h3>Presets</h3>
        <button type="button" id="presetPanelClose" class="btn-icon btn-outline" aria-label="Close">
          <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true">
            <path d="M4 4 l10 10 M14 4 l-10 10"/>
          </svg>
        </button>
      </header>
      <div class="preset-panel-body">
        <aside class="preset-list-pane">
          <ul id="presetList" class="preset-list"></ul>
          <button type="button" id="presetNewBtn" class="btn btn-outline btn-ghost">+ New preset</button>
          <button type="button" id="presetResetBtn" class="btn btn-outline btn-ghost">Reset to factory</button>
        </aside>
        <section class="preset-edit-pane">
          <div id="presetEditForm" class="preset-edit-form">
            <label class="control">
              <span>Name</span>
              <input id="pe_name" type="text" />
            </label>
            <label class="control">
              <span>Steps</span>
              <div class="control-row">
                <input id="pe_steps" type="range" min="1" max="120" step="1" value="50" />
                <output id="pe_stepsValue">50</output>
              </div>
            </label>
            <label class="control">
              <span>Guidance scale</span>
              <div class="control-row">
                <input id="pe_guidance" type="range" min="1" max="20" step="0.5" value="5" />
                <output id="pe_guidanceValue">5.0</output>
              </div>
            </label>
            <label class="control">
              <span>Base size (edit mode)</span>
              <select id="pe_basesize">
                <option>256</option>
                <option>512</option>
                <option>768</option>
                <option selected>1024</option>
              </select>
            </label>
            <fieldset class="control control-fieldset">
              <legend>Seed</legend>
              <label class="checkbox">
                <input id="pe_randomSeed" type="checkbox" />
                <span>Randomize each run</span>
              </label>
              <div class="control-row">
                <input id="pe_seed" type="number" min="0" value="42" />
              </div>
            </fieldset>
            <label class="checkbox">
              <input id="pe_rewrite" type="checkbox" checked />
              <span>Rewrite prompt (LLM)</span>
            </label>
            <div class="preset-actions">
              <button type="button" id="pe_setDefault" class="btn btn-outline btn-ghost">Set as default</button>
              <button type="button" id="pe_duplicate" class="btn btn-outline btn-ghost">Duplicate</button>
              <button type="button" id="pe_delete" class="btn btn-outline btn-ghost">Delete</button>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div id="lightbox" class="lightbox" hidden role="dialog" aria-modal="true" aria-label="Output preview">
    <button type="button" id="lightboxClose" class="lightbox-close" aria-label="Close preview">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true">
        <path d="M4 4 l10 10 M14 4 l-10 10"/>
      </svg>
    </button>
    <img id="lightboxImage" alt="Generated output (enlarged)" />
  </div>

  <script src="/static/main.js?v=2"></script>
</body>
</html>
